<div class="analytics-page">
  <div class="overlay"></div>

  <header class="top-nav">
    <div class="nav-left">
      <div class="logo" (click)="goToHome()">✺</div>
      <div class="dropdown">
        <button class="dropbtn">Browse <span class="arrow">▼</span></button>
        <div class="dropdown-content">
          <a (click)="navigateTo('all')">Explore all</a>
          <a (click)="navigateTo('games')">Games</a>
          <a (click)="navigateTo('films')">Films</a>
          <a (click)="navigateTo('series')">Series</a>
          <a (click)="navigateTo('books')">Books</a>
        </div>
      </div>
    </div>
    <div class="nav-right">
      <button class="btn-logout" (click)="logout()">Logout</button>
      <div class="avatar"></div>
    </div>
  </header>
  <div style="margin-top: 30px;">
    <button class="back-btn" (click)="goToAdmin()">← Повернутися до панелі керування</button>
  </div>

  <header class="admin-header" style="margin-top: 30px;">
    <h1>Platform Analytics <span class="v-line">|</span> <small>Admin Dashboard</small></h1>
  </header>

  <div class="dashboard-grid">
    <div class="glass-card">
      <div class="card-header">
        <i class="icon-pie"></i>
        <h3>Genre Distribution</h3>
      </div>
      <div class="chart-container">
        <canvas *ngIf="pieChartData.labels?.length"
                baseChart
                [data]="pieChartData"
                [type]="pieChartType"
                [options]="chartOptions">
        </canvas>
        <div *ngIf="!pieChartData.labels?.length" class="loader">Accessing Database...</div>
      </div>
    </div>

    <div class="glass-card">
      <div class="card-header">
        <i class="icon-line"></i>
        <h3>User Activity Dynamics</h3>
      </div>
      <div class="chart-container">
        <canvas *ngIf="lineChartData.labels?.length"
                baseChart
                [data]="lineChartData"
                [type]="lineChartType"
                [options]="chartOptions">
        </canvas>
        <div *ngIf="!lineChartData.labels?.length" class="loader">Fetching Activity Logs...</div>
      </div>
    </div>
  </div>
</div>
