version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - platform-network

  redis:
    image: redis:alpine
    container_name: platform-redis
    ports:
      - "6379:6379"
    networks:
      - platform-network

  auth-service:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    container_name: auth-service
    environment:
      - ConnectionStrings__DefaultConnection=${AUTH_DB_CONNECTION}
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5001:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - platform-network

  user-service:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    container_name: user-service
    environment:
      - ConnectionStrings__DefaultConnection=${USER_DB_CONNECTION}
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5002:8080"
    depends_on:
      - postgres
    networks:
      - platform-network

  content-service:
    build:
      context: .
      dockerfile: ContentService/Dockerfile
    container_name: content-service
    environment:
      - ConnectionStrings__DefaultConnection=${CONTENT_DB_CONNECTION}
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - UserService__BaseUrl=http://user-service:8080
      - RawgApi__BaseUrl=https://api.rawg.io/api/
      - RawgApi__ApiKey=${RAWG_API_KEY}
      - TmdbApi__BaseUrl=https://api.themoviedb.org/3/
      - TmdbApi__ApiKey=${TMDB_API_KEY}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY}
    ports:
      - "5003:8080"
    depends_on:
      - postgres
      - user-service
    networks:
      - platform-network

  interaction-service:
    build:
      context: .
      dockerfile: InteractionService/Dockerfile
    container_name: interaction-service
    environment:
      - ConnectionStrings__DefaultConnection=${INTERACT_DB_CONNECTION}
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5004:8080"
    depends_on:
      - postgres
    networks:
      - platform-network

  recommendation-service:
    build:
      context: ./RecommendationService
      dockerfile: Dockerfile
    container_name: recommendation-service
    env_file:        
      - .env           
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - platform-network

  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Services__Auth=http://auth-service:8080
      - Services__User=http://user-service:8080
      - Services__Content=http://content-service:8080
      - Services__Interaction=http://interaction-service:8080
      - Services__Recommendation=http://recommendation-service:8000
    ports:
      - "5000:8080"
    depends_on:
      - auth-service
      - user-service
      - content-service
      - interaction-service
      - recommendation-service
    networks:
      - platform-network

  frontend:
    build:
      context: ../web-client   
      dockerfile: Dockerfile    
    container_name: platform-frontend
    ports:
      - "4200:80"               
    depends_on:
      - api-gateway            
    networks:
      - platform-network

volumes:
  postgres_data:

networks:
  platform-network:
    driver: bridge