version: '3.8'

services:
  # ---------------------------------------
  # 1. БАЗА ДАНИХ (PostgreSQL)
  # ---------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432" # Доступ із хоста (Visual Studio / PgAdmin локальний)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform-network

  # ---------------------------------------
  # 2. UI ДЛЯ БАЗИ ДАНИХ (pgAdmin) - Це зручно!
  # ---------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - platform-network

  # ---------------------------------------
  # 3. КЕШ (Redis) - Для токенів та швидкодії
  # ---------------------------------------
  redis:
    image: redis:alpine
    container_name: platform-redis
    ports:
      - "6379:6379"
    networks:
      - platform-network

  # ---------------------------------------
  # 4. ВАШІ МІКРОСЕРВІСИ
  # ---------------------------------------
  
  # Сервіс Аутентифікації
  auth-service:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    container_name: auth-service
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=AuthDb;Username=admin;Password=password123
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5001:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - platform-network

  # Сервіс Користувачів
  user-service:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    container_name: user-service
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=UserDb;Username=admin;Password=password123
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5002:8080"
    depends_on:
      - postgres
    networks:
      - platform-network

  # Сервіс Контенту
  content-service:
    build:
      context: .
      dockerfile: ContentService/Dockerfile
    container_name: content-service
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ContentDb;Username=admin;Password=password123
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5003:8080"
    depends_on:
      - postgres
    networks:
      - platform-network

  # Сервіс Взаємодії
  interaction-service:
    build:
      context: .
      dockerfile: InteractionService/Dockerfile
    container_name: interaction-service
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=InteractionDb;Username=admin;Password=password123
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5004:8080"
    depends_on:
      - postgres
    networks:
      - platform-network

  # API Gateway (Вхідна точка)
  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # Налаштування маршрутизації будуть у appsettings.json або Ocelot.json
      # Gateway має знати, де знаходяться інші сервіси (використовуємо імена контейнерів)
      - Services__Auth=http://auth-service:8080
      - Services__User=http://user-service:8080
      - Services__Content=http://content-service:8080
      - Services__Interaction=http://interaction-service:8080
    ports:
      - "5000:8080" # Це головний порт, на який стукатиме Frontend
    depends_on:
      - auth-service
      - user-service
      - content-service
      - interaction-service
    networks:
      - platform-network

volumes:
  postgres_data:

networks:
  platform-network:
    driver: bridge